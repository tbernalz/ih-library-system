name: Publish Docker image

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ihlibrarysystem
  DOCKER_USER: tbernal121
  DOCKERFILE_PATH: IH.LibrarySystem.Api/Dockerfile

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          cache: false

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test IH.LibrarySystem.Application.Tests/IH.LibrarySystem.Application.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=unit-tests.trx"

      - name: Run Integration Tests
        run: dotnet test IH.LibrarySystem.IntegrationTests/IH.LibrarySystem.IntegrationTests.csproj --configuration Release --no-build --logger "trx;LogFileName=integration-tests.trx"

  build-publish-deploy:
    needs: run-tests
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ih-library-system.onrender.com/api
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Bump version and push tag
        id: bump-version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: false
          DEFAULT_BUMP: minor

      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true

          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:${{ steps.bump-version.outputs.new_tag }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Render
        run: curl -f ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
