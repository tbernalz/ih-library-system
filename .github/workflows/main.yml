name: Publish Docker image

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ihlibrarysystem
  DOCKER_USER: tbernal121
  DOCKERFILE_PATH: IH.LibrarySystem.Api/Dockerfile

jobs:
  build-publish-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ih-library-system.onrender.com/api
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Bump version and push tag
        id: bump-version
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: false
          DEFAULT_BUMP: minor

      - name: Build and push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_USER }}/${{ env.IMAGE_NAME }}:${{ steps.bump-version.outputs.new_tag }}

            cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Render
        run: curl -f ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
